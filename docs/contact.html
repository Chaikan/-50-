<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .form-box {
            max-width: 600px;
            margin: 50px auto;
            background: #020617;
            padding: 25px;
            border-radius: 12px;
            color: #e2e8f0;
        }

        .form-box h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-box label {
            display: block;
            margin: 10px 0 5px;
        }

        .form-box input,
        .form-box textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        .form-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            cursor: pointer;
        }

        .form-box button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

 <nav>
    <h2>Internet Security</h2>

    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <ul class="menu-main">
        <li><a href="index.html">หน้าแรก</a></li>

        <li class="dropdown">
            <a href="#" onclick="toggleDropdown(event)">เนื้อหา ▼</a>
            <ul class="dropdown-menu">

            </ul>

        <li><a href="member.html">สมาชิก</a></li>
        <li><a href="contact.html">ติดต่อ</a></li>
    </ul>
</nav>

    <div class="container">

        <div class="form-box">
            <h1>ติดต่อสอบถาม</h1>

            <form onsubmit="submitForm(event)">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="name" placeholder="กรอกชื่อของคุณ" required>

                <label>อีเมล</label>
                <input type="email" id="email" placeholder="example@email.com" required>

                <label>ข้อความ</label>
                <textarea rows="4" id="message" placeholder="พิมพ์ข้อความ..." required></textarea>

                <button type="submit">ส่งข้อความ</button>
            </form>

            <p id="status" style="margin-top:10px;"></p>
        </div>

    </div>


    <script>
        function submitForm(e) {
            e.preventDefault();

            let name = document.getElementById("name").value;

            let status = document.getElementById("status");
            status.style.color = "lightgreen";
            status.innerText = "✅ ส่งข้อความสำเร็จ ขอบคุณ " + name;
        }
    </script>
   <script>
function toggleMenu() {
    document.querySelector(".menu-main").classList.toggle("active");
}

function toggleDropdown(e) {
    e.preventDefault();
    let dropdown = e.target.nextElementSibling;
    dropdown.classList.toggle("show");
}
</script>

    </footer>
</body>
